# 애플리케이션 이름
spring.application.name=demo

# 서버 포트 & 모든 인터페이스에서 수신
server.address=0.0.0.0
server.port=8080

# MySQL DB 설정 (로컬)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/recycle?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 설정
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.connection-timeout=30000

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.endpoint.health.probes.enabled=true

# 로깅
logging.level.org.springframework.web=DEBUG

# 인코딩
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# 업로드/AI 경로
app.upload-dir=uploads
script.python-exe=python
script.path=scripts/recycle.py
script.weight=scripts/best.pt

# AI API URL
ai.api.url=https://b5de-203-255-63-30.ngrok-free.app/recycle/analyze