<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 테스트</title>
</head>
<body>
    <h2>회원가입 테스트</h2>
    <form id="signupForm">
        <label>사용자 이름: <input type="text" id="username" required></label><br>
        <label>이메일: <input type="email" id="email" required></label><br>
        <label>비밀번호: <input type="password" id="password" required></label><br>
        <button type="submit">회원가입</button>
    </form>

    <p id="result"></p>

    <script>
        document.getElementById("signupForm").addEventListener("submit", async function(event) {
            event.preventDefault();

            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const response = await fetch("http://localhost:8081/users/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password })
            });

            const resultText = await response.text();
            document.getElementById("result").innerText = resultText;
        });
    </script>
</body>
</html>
